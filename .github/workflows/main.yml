<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أكاديمية تعلم الهكر الأخلاقي</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#0d1117;
color:white;
}

header{
background:#161b22;
padding:20px;
text-align:center;
border-bottom:3px solid #00ff99;
}

header h1{
color:#00ff99;
font-size:40px;
}

nav{
margin-top:15px;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
font-size:18px;
}

nav a:hover{
color:#00ff99;
}

.hero{
padding:80px 20px;
text-align:center;
}

.hero h2{
font-size:45px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
color:#c9d1d9;
margin-bottom:30px;
}

button{
background:#00ff99;
color:black;
padding:15px 35px;
border:none;
border-radius:10px;
font-size:20px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
padding:40px;
gap:20px;
}

.card{
background:#161b22;
width:300px;
padding:20px;
border-radius:15px;
text-align:center;
transition:.3s;
border:2px solid #00ff99;
}

.card:hover{
transform:translateY(-8px);
}

.card h3{
margin-bottom:15px;
color:#00ff99;
}

footer{
background:#161b22;
padding:20px;
text-align:center;
margin-top:50px;
}
</style>

</head>
<body>

<header>
<h1>أكاديمية تعلم الهكر الأخلاقي</h1>

<nav>
<a href="#">الرئيسية</a>
<a href="#">الدورات</a>
<a href="#">المختبر</a>
<a href="#">الاختبارات</a>
<a href="#">تواصل معنا</a>
</nav>

</header>

<section class="hero">

<h2>ابدأ رحلتك في الأمن السيبراني</h2>

<p>
تعلم أساسيات الأمن السيبراني والهكر الأخلاقي من الصفر وحتى الاحتراف
بشكل قانوني ومسؤول.
</p>

<button>ابدأ التعلم</button>

</section>

<section class="cards">

<div class="card">
<h3>أساسيات الشبكات</h3>
<p>تعلم TCP/IP وDNS وHTTP بطريقة سهلة.</p>
</div>

<div class="card">
<h3>Linux</h3>
<p>تعلم أهم أوامر لينكس للمبتدئين.</p>
</div>

<div class="card">
<h3>Python</h3>
<p>تعلم بايثون واستخدامها في الأمن السيبراني.</p>
</div>

<div class="card">
<h3>اختبار اختراق الويب</h3>
<p>تدريب على مواقع مخصصة للتعلم فقط.</p>
</div>

</section>

<footer>

<p>© 2026 أكاديمية تعلم الهكر الأخلاقي - جميع الحقوق محفوظة.</p>

</footer>

</body>
</html>
